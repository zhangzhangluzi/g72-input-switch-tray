name: Release

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: npm run verify:self

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*

  build-macos:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: npm run verify:self

      - name: Build bundled ddcctl helper
        run: |
          chmod +x scripts/build-macos-ddcctl.sh
          ./scripts/build-macos-ddcctl.sh

      - name: Build macOS app
        run: npm run dist:mac

      - name: Verify bundled macOS app
        run: SELF_VERIFY_REQUIRE_MAC_APP_BUNDLE=1 npm run verify:self

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: release/*

  create-release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --repo "$GH_REPO" --title "${TAG_NAME#v}" --notes "Release ${TAG_NAME#v}"

  release-windows:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: npm run verify:self

      - name: Build Windows installer
        run: npm run dist:win

      - name: Verify Windows artifacts
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path release -Filter "g72-input-switch-tray-setup-*.exe" | Select-Object -First 1
          if ($null -eq $installer) {
            throw "Windows installer was not produced."
          }
          if ($installer.Length -lt 1MB) {
            throw "Windows installer is unexpectedly small: $($installer.Length) bytes."
          }

      - name: Upload Windows release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $assets = @()
          $assets += Get-ChildItem -Path release -File -Filter "g72-input-switch-tray-setup-*.exe"
          $assets += Get-ChildItem -Path release -File -Filter "g72-input-switch-tray-setup-*.exe.blockmap"
          $assets += Get-ChildItem -Path release -File -Filter "latest.yml"
          if ($assets.Count -lt 3) {
            throw "Windows release assets are incomplete."
          }
          gh release upload $env:GITHUB_REF_NAME $assets --clobber

  release-macos:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: npm run verify:self

      - name: Build bundled ddcctl helper
        run: |
          chmod +x scripts/build-macos-ddcctl.sh
          ./scripts/build-macos-ddcctl.sh

      - name: Build macOS app
        run: npm run dist:mac

      - name: Verify bundled macOS app
        run: SELF_VERIFY_REQUIRE_MAC_APP_BUNDLE=1 npm run verify:self

      - name: Upload macOS release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          assets=(
            release/g72-input-switch-tray-*-arm64.dmg
            release/g72-input-switch-tray-*-arm64.dmg.blockmap
            release/g72-input-switch-tray-*-arm64.zip
            release/g72-input-switch-tray-*-arm64.zip.blockmap
            release/latest-mac.yml
          )
          for asset in "${assets[@]}"; do
            test -f "$asset"
          done
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
