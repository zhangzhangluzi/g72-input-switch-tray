name: Release

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: npm run verify:self

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*

  build-macos:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: npm run verify:self

      - name: Build bundled ddcctl helper
        run: |
          chmod +x scripts/build-macos-ddcctl.sh
          ./scripts/build-macos-ddcctl.sh

      - name: Build macOS app
        run: npm run dist:mac

      - name: Verify bundled macOS app
        run: SELF_VERIFY_REQUIRE_MAC_APP_BUNDLE=1 npm run verify:self

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: release/*

  release-windows:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: npm run verify:self

      - name: Publish Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release -- --win nsis
        shell: pwsh

  release-macos:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: npm run verify:self

      - name: Build bundled ddcctl helper
        run: |
          chmod +x scripts/build-macos-ddcctl.sh
          ./scripts/build-macos-ddcctl.sh

      - name: Publish macOS app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release -- --mac dmg zip

      - name: Verify bundled macOS app
        run: SELF_VERIFY_REQUIRE_MAC_APP_BUNDLE=1 npm run verify:self
