name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: npm run verify:self

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ("${{ startsWith(github.ref, 'refs/tags/v') }}" -eq "true") {
            npm run release -- --win nsis
          } else {
            npm run dist:win
          }
        shell: pwsh

      - name: Upload Windows artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: npm run verify:self

      - name: Build bundled ddcctl helper
        run: |
          chmod +x scripts/build-macos-ddcctl.sh
          ./scripts/build-macos-ddcctl.sh

      - name: Build macOS app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ startsWith(github.ref, 'refs/tags/v') }}" == "true" ]]; then
            npm run release -- --mac dmg zip
          else
            npm run dist:mac
          fi

      - name: Upload macOS artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: release/*
